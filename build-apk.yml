name: Build APK

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Install Android SDK command-line tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip
          unzip -q cmdline.zip -d cmdline-tools-temp
          mkdir -p cmdline-tools/latest
          mv cmdline-tools-temp/cmdline-tools/* cmdline-tools/latest/
          rm -rf cmdline.zip cmdline-tools-temp
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Install SDK components
        run: |
          yes | sdkmanager --sdk_root=${ANDROID_SDK_ROOT:-$HOME/android-sdk} "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Prepare web assets
        run: |
          set -e
          rm -rf taitrts/www
          mkdir -p taitrts/www
          cp -r taitrts/index.html taitrts/styles.css taitrts/game.js taitrts/package.json taitrts/capacitor.config.json taitrts/README.md taitrts/www/

      - name: Install Capacitor CLI
        run: |
          cd taitrts
          npm install @capacitor/cli @capacitor/core --no-audit --no-fund

      - name: Create Android project with Capacitor
        run: |
          set -e
          cd taitrts
          npx cap init Taitrts com.example.taitrts --web-dir=www || true
          npx cap add android --no-interactive || true
          npx cap copy

      - name: Build Android APK (Gradle)
        run: |
          set -e
          cd taitrts/android && ./gradlew assembleRelease --no-daemon -Porg.gradle.jvmargs='-Xmx1536m'

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: taitrts-apk
          path: taitrts/android/app/build/outputs/apk/release/*.apk
